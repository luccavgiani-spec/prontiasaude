    <!-- Mercado Pago Security Script (Device Fingerprint) - Carregamento diferido -->
    <script>
      // Carregar MP security.js somente quando necessário (após window.load)
      window.loadMPSecurity = function() {
        if (window.MP_SECURITY_LOADED) return;
        window.MP_SECURITY_LOADED = true;
        var script = document.createElement('script');
        script.src = 'https://www.mercadopago.com/v2/security.js';
        script.setAttribute('view', 'checkout');
        script.async = true;
        document.head.appendChild(script);
      };
      
      // Carregar SOMENTE após window.load + 2s ou quando modal de pagamento for aberto
      window.addEventListener('load', function() {
        setTimeout(window.loadMPSecurity, 2000);
      });
    </script>
