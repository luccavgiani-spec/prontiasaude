      /* Critical CSS - Above the fold rendering */
      *,::before,::after{box-sizing:border-box;border-width:0;border-style:solid;border-color:currentColor}
      html{line-height:1.5;-webkit-text-size-adjust:100%;-moz-tab-size:4;tab-size:4;font-family:system-ui,sans-serif;font-size-adjust:0.5}
      body{margin:0;line-height:inherit;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
      :root{--background:0 0% 100%;--foreground:222.2 84% 4.9%;--primary:172 100% 23%;--primary-light:172 30% 85%;--primary-glow:172 80% 30%;--primary-foreground:0 0% 100%;--secondary:40 98% 50%;--secondary-foreground:0 0% 100%;--accent:13 69% 57%;--muted:32 43% 89%;--muted-foreground:215.4 16.3% 46.9%;--border:214.3 31.8% 91.4%;--radius:0.75rem;--shadow-button:0 4px 14px 0 hsl(172,100%,23%,0.39);--transition-smooth:all 0.3s cubic-bezier(0.4,0,0.2,1);--gradient-primary:linear-gradient(135deg,hsl(172,100%,23%) 0%,hsl(172,80%,30%) 100%)}
      
      /* Font-face com métricas ajustadas para CLS zero */
      @font-face{font-family:'Nunito Fallback';src:local('Arial');ascent-override:105%;descent-override:35%;line-gap-override:0%;size-adjust:95%}
      @font-face{font-family:'Poppins Fallback';src:local('Arial');ascent-override:100%;descent-override:30%;line-gap-override:0%;size-adjust:100%}
      
      body{background:hsl(var(--background));color:hsl(var(--foreground));font-family:'Nunito','Nunito Fallback',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-feature-settings:"rlig" 1,"calt" 1}
      #root{min-height:100vh;width:100%;contain:layout style paint}
      h1,h2,h3,h4,h5,h6,button{font-family:'Poppins','Poppins Fallback',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:600}
      
      /* Estrutura estável da hero - altura fixa, sem animações */
      .hero-section{min-height:600px;display:flex;align-items:center;justify-content:center;overflow:hidden;contain:layout style}
      .hero-picture{display:block;width:100%;height:auto}
      .hero-picture img{aspect-ratio:16/9;object-fit:cover;width:100%;height:auto;display:block}
      
      /* Botões e CTAs com altura fixa */
      nav{min-height:56px;will-change:transform;contain:layout style}
      .hero-button{height:56px!important;min-width:220px!important;padding-top:0!important;padding-bottom:0!important}
      .hero-cta-container{min-height:56px}
      
      .container{width:100%;max-width:1280px;margin:0 auto;padding:0 1rem}
      button,a[role="button"]{min-height:48px;min-width:48px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
      img,picture{content-visibility:auto;max-width:100%;height:auto;display:block}
      .medical-button-primary{background:linear-gradient(135deg,hsl(172,100%,23%),hsl(172,80%,30%));box-shadow:0 4px 14px 0 rgba(0,118,106,0.39)}
      .hero-subtitle{line-height:1.6;opacity:0.9;contain:layout}
      
      /* Sections abaixo da dobra */
      section:not(.hero-section){content-visibility:auto;contain-intrinsic-size:800px}
      
      @media(max-width:768px){
        html{font-size:14px}
        .container{padding:0 1rem}
        .hero-section{min-height:500px}
        .hero-button{height:48px!important;min-width:200px!important;font-size:14px!important}
      }
      
      /* Remover animações que causam CLS */
      .animate-fade-in{opacity:1;transform:none}
    </style>
